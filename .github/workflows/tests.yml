name: Tests

# Se déclenche automatiquement sur chaque push et pull request.
# Ces tests n'appellent AUCUNE API externe (LLM et embeddings entièrement
# simulés via DeterministicFakeEmbedding / FakeListChatModel) : ils sont
# gratuits et rapides à exécuter à chaque commit, contrairement à
# l'évaluation Ragas (voir evaluate.yml) qui consomme du quota API et ne
# se déclenche donc que manuellement.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  unit-and-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tests unitaires (indexation, nettoyage, chaîne RAG)
        run: pytest tests/ -v

      - name: Tests fonctionnels de l'API (/ask, /rebuild)
        run: pytest api_test.py -v
