name: Évaluation Ragas (manuel)

# Contrairement à tests.yml, ce workflow N'EST PAS déclenché automatiquement
# sur chaque push : il fait de VRAIS appels à l'API Mistral (génération des
# réponses ET LLM-juge Ragas), ce qui consomme du quota/coûte de l'argent.
# On le déclenche donc uniquement à la demande (workflow_dispatch), depuis
# l'onglet "Actions" du dépôt GitHub, quand on veut vraiment mesurer la
# qualité du système (ex. avant une démo, après un changement de prompt).
#
# Secrets requis à configurer dans les paramètres du dépôt GitHub
# (Settings > Secrets and variables > Actions) :
#   - MISTRAL_API_KEY
#   - OPENAGENDA_API_KEY

on:
  workflow_dispatch:

jobs:
  evaluate-rag-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ragas==0.1.21

      - name: Reconstruction des données et de l'index
        env:
          OPENAGENDA_API_KEY: ${{ secrets.OPENAGENDA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          EMBEDDING_PROVIDER: mistral
        run: |
          python scripts/fetch_open_agenda.py
          python scripts/clean_data.py
          python scripts/build_index.py

      - name: Évaluation Ragas du système RAG
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          EMBEDDING_PROVIDER: mistral
        run: python eval/evaluate_rag.py

      - name: Sauvegarde des résultats d'évaluation
        uses: actions/upload-artifact@v4
        with:
          name: ragas-evaluation-results
          path: eval/results/
